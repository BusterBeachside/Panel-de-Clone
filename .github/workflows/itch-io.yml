name: Build & Package Game

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 22

      - name: Install Dependencies
          # clean install
        run: npm ci

      - name: Build Game
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: panel-attack-clone-html5
          path: dist/

